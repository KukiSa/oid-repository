[build]
  base = "/"
  command = "npm run build"
  publish = "out/"
  [build.environment]
    NODE_VERSION = "24"
    SHOW_HOSTING_BADGE = "true"
    HOSTING_PLATFORM_NAME = "Netlify"
    HOSTING_PLATFORM_URL = "https://www.netlify.com/"

[[headers]]
  for = "/*"
  [headers.values]
    cache-control = '''
    public,
    max-age=2592000,
    s-maxage=2592000'''
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
